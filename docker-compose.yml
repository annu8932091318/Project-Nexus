version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: nexus-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/vector_store:/chroma/chroma

  searxng:
    image: searxng/searxng:latest
    container_name: nexus-searxng
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
